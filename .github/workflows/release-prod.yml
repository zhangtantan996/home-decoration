name: Release Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to deploy, for example v1.12.3
        required: true
        type: string
      service_scope:
        description: Which services to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - api
          - web

concurrency:
  group: production-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-release:
    name: Verify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      USER_WEB_FIXTURE_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/home_decoration?sslmode=disable
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
      service_scope: ${{ steps.release.outputs.service_scope }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: home_decoration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d home_decoration"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:6.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            service_scope="${{ inputs.service_scope }}"
          else
            tag="${GITHUB_REF_NAME}"
            service_scope="all"
          fi

          if [[ ! "${tag}" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "Release tag must start with v, got: ${tag}" >&2
            exit 1
          fi

          case "${service_scope}" in
            api|web|all) ;;
            *)
              echo "Invalid service scope: ${service_scope}" >&2
              exit 1
              ;;
          esac

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "service_scope=${service_scope}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            admin/package-lock.json
            merchant/package-lock.json
            web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'
          cache-dependency-path: server/go.sum

      - name: Install root dependencies
        run: npm ci

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci --legacy-peer-deps

      - name: Build admin
        working-directory: admin
        env:
          VITE_APP_ENV: production
          VITE_API_URL: /api/v1
          VITE_ROUTER_BASENAME: /admin
        run: npm run build

      - name: Install merchant dependencies
        working-directory: merchant
        run: npm ci --legacy-peer-deps

      - name: Build merchant
        working-directory: merchant
        env:
          VITE_APP_ENV: production
          VITE_API_URL: /api/v1
          VITE_ROUTER_BASENAME: /merchant
        run: npm run build

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Restore base schema/data
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -U postgres -d home_decoration -f public.sql

      - name: Build user web
        working-directory: web
        env:
          VITE_APP_ENV: production
          VITE_API_URL: /api/v1
          VITE_ROUTER_BASENAME: /
          VITE_PUBLIC_SITE_URL: /
        run: npm run build

      - name: Start API
        env:
          APP_ENV: local
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 5432
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_DBNAME: home_decoration
          DATABASE_NAME: home_decoration
          DATABASE_SSLMODE: disable
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: release_verify_jwt_secret_2026
          SMS_PROVIDER: mock
          SMS_DEBUG_BYPASS: "true"
          SMS_RISK_ENABLED: "false"
        run: |
          cd server
          nohup go run ./cmd/api >/tmp/release-prod-api.log 2>&1 &
          echo $! >/tmp/release-prod-api.pid

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8080/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/release-prod-api.log || true
          exit 1

      - name: Run verify:backend
        env:
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 5432
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_DBNAME: home_decoration
          DATABASE_NAME: home_decoration
          DATABASE_SSLMODE: disable
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: release_verify_jwt_secret_2026
        run: npm run verify:backend

      - name: Run smoke:release
        run: npm run smoke:release

      - name: Print API log on failure
        if: failure()
        run: cat /tmp/release-prod-api.log || true

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/release-prod-api.pid ]; then
            kill "$(cat /tmp/release-prod-api.pid)" || true
          fi

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify-release
    environment: production

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add server host key
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${PROD_HOST:?missing PROD_HOST}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [[ -n "${PROD_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "${PROD_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${PROD_PORT:-22}" -H "${PROD_HOST}" >> ~/.ssh/known_hosts
          fi

          chmod 600 ~/.ssh/known_hosts

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.verify-release.outputs.release_tag }}

      - name: Resolve release commit
        id: release-meta
        shell: bash
        run: |
          set -euo pipefail
          echo "commit=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Sync workspace to production server
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
        run: |
          set -euo pipefail
          : "${PROD_HOST:?missing PROD_HOST}"
          : "${PROD_USER:?missing PROD_USER}"
          : "${PROD_APP_DIR:?missing PROD_APP_DIR}"

          ssh -p "${PROD_PORT:-22}" "${PROD_USER}@${PROD_HOST}" "mkdir -p '${PROD_APP_DIR}'"

          rsync -az --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'dist/' \
            --exclude 'output/' \
            --exclude 'playwright-report/' \
            --exclude 'test-results/' \
            --exclude 'db_data_local/' \
            --exclude 'deploy/.env' \
            --exclude 'deploy/.env.test' \
            --exclude 'deploy/backups/' \
            --exclude 'deploy/state/' \
            --exclude 'server/uploads/' \
            --exclude 'server/uploads_test/' \
            -e "ssh -p ${PROD_PORT:-22}" \
            ./ "${PROD_USER}@${PROD_HOST}:${PROD_APP_DIR}/"

      - name: Run remote deploy
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          RELEASE_TAG: ${{ needs.verify-release.outputs.release_tag }}
          RELEASE_COMMIT: ${{ steps.release-meta.outputs.commit }}
          SERVICE_SCOPE: ${{ needs.verify-release.outputs.service_scope }}
        run: |
          set -euo pipefail
          : "${PROD_HOST:?missing PROD_HOST}"
          : "${PROD_USER:?missing PROD_USER}"
          : "${PROD_APP_DIR:?missing PROD_APP_DIR}"
          : "${RELEASE_TAG:?missing RELEASE_TAG}"
          : "${RELEASE_COMMIT:?missing RELEASE_COMMIT}"
          : "${SERVICE_SCOPE:?missing SERVICE_SCOPE}"

          ssh -p "${PROD_PORT:-22}" "${PROD_USER}@${PROD_HOST}" \
            "cd '${PROD_APP_DIR}' && RELEASE_COMMIT_OVERRIDE='${RELEASE_COMMIT}' bash deploy/scripts/deploy_prod.sh --tag '${RELEASE_TAG}' --service '${SERVICE_SCOPE}' --skip-git"
