name: Release Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to deploy, for example v1.12.3
        required: true
        type: string
      service_scope:
        description: Which services to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - api
          - web

concurrency:
  group: production-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-release:
    name: Verify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
      service_scope: ${{ steps.release.outputs.service_scope }}

    steps:
      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            service_scope="${{ inputs.service_scope }}"
          else
            tag="${GITHUB_REF_NAME}"
            service_scope="all"
          fi

          if [[ ! "${tag}" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "Release tag must start with v, got: ${tag}" >&2
            exit 1
          fi

          case "${service_scope}" in
            api|web|all) ;;
            *)
              echo "Invalid service scope: ${service_scope}" >&2
              exit 1
              ;;
          esac

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "service_scope=${service_scope}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            admin/package-lock.json
            merchant/package-lock.json
            web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'
          cache-dependency-path: server/go.sum

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci --legacy-peer-deps

      - name: Build admin
        working-directory: admin
        env:
          VITE_APP_ENV: production
          VITE_API_URL: /api/v1
          VITE_ROUTER_BASENAME: /admin
        run: npm run build

      - name: Install merchant dependencies
        working-directory: merchant
        run: npm ci --legacy-peer-deps

      - name: Build merchant
        working-directory: merchant
        env:
          VITE_APP_ENV: production
          VITE_API_URL: /api/v1
          VITE_ROUTER_BASENAME: /merchant
        run: npm run build

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build user web
        working-directory: web
        env:
          VITE_APP_ENV: production
          VITE_API_URL: /api/v1
          VITE_ROUTER_BASENAME: /
          VITE_PUBLIC_SITE_URL: /
        run: npm run build

      - name: Run backend tests
        working-directory: server
        run: go test ./...

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify-release
    environment: production

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add server host key
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${PROD_HOST:?missing PROD_HOST}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [[ -n "${PROD_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "${PROD_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${PROD_PORT:-22}" -H "${PROD_HOST}" >> ~/.ssh/known_hosts
          fi

          chmod 600 ~/.ssh/known_hosts

      - name: Run remote deploy
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          RELEASE_TAG: ${{ needs.verify-release.outputs.release_tag }}
          SERVICE_SCOPE: ${{ needs.verify-release.outputs.service_scope }}
        run: |
          set -euo pipefail
          : "${PROD_HOST:?missing PROD_HOST}"
          : "${PROD_USER:?missing PROD_USER}"
          : "${PROD_APP_DIR:?missing PROD_APP_DIR}"
          : "${RELEASE_TAG:?missing RELEASE_TAG}"
          : "${SERVICE_SCOPE:?missing SERVICE_SCOPE}"

          ssh -p "${PROD_PORT:-22}" "${PROD_USER}@${PROD_HOST}" \
            "cd '${PROD_APP_DIR}' && git fetch --tags --prune && bash deploy/scripts/deploy_prod.sh --tag '${RELEASE_TAG}' --service '${SERVICE_SCOPE}'"
