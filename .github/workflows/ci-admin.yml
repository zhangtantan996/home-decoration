name: Admin CI

on:
  push:
    branches: [ "dev" ]
    paths:
      - 'admin/**'
  pull_request:
    branches: [ "dev" ]
    paths:
      - 'admin/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: admin

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: admin/package-lock.json

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Lint
      run: npm run lint
      continue-on-error: true # Not blocking build if there are lint warnings

    - name: Build
      run: npm run build
      env:
        VITE_API_URL: http://localhost:8080/api/v1
