name: Deploy Test

on:
  push:
    branches:
      - dev
    paths:
      - 'admin/**'
      - 'merchant/**'
      - 'web/**'
      - 'server/**'
      - 'deploy/**'
      - 'scripts/**'
      - 'package.json'
      - 'shared/**'
      - '.github/workflows/deploy-test.yml'
      - '.github/workflows/rollback-test.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy, for example dev or a commit SHA
        required: true
        default: dev
        type: string
      service_scope:
        description: Which services to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - api
          - web

concurrency:
  group: test-release
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-test-candidate:
    name: Verify test candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      USER_WEB_FIXTURE_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/home_decoration?sslmode=disable
    outputs:
      deploy_ref: ${{ steps.release.outputs.ref }}
      service_scope: ${{ steps.release.outputs.service_scope }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: home_decoration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d home_decoration"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:6.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Resolve deploy inputs
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            deploy_ref="${{ inputs.ref }}"
            service_scope="${{ inputs.service_scope }}"
          else
            deploy_ref="${GITHUB_SHA}"
            service_scope="all"
          fi

          case "${service_scope}" in
            api|web|all) ;;
            *)
              echo "Invalid service scope: ${service_scope}" >&2
              exit 1
              ;;
          esac

          echo "ref=${deploy_ref}" >> "${GITHUB_OUTPUT}"
          echo "service_scope=${service_scope}" >> "${GITHUB_OUTPUT}"

      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            admin/package-lock.json
            merchant/package-lock.json
            web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'
          cache-dependency-path: server/go.sum

      - name: Install root dependencies
        run: npm ci

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci --legacy-peer-deps

      - name: Build admin
        working-directory: admin
        env:
          VITE_APP_ENV: test
          VITE_API_URL: /api/v1
          VITE_ROUTER_BASENAME: /admin
        run: npm run build

      - name: Install merchant dependencies
        working-directory: merchant
        run: npm ci --legacy-peer-deps

      - name: Build merchant
        working-directory: merchant
        env:
          VITE_APP_ENV: test
          VITE_API_URL: /api/v1
          VITE_ROUTER_BASENAME: /merchant
        run: npm run build

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Restore base schema/data
        env:
          PGPASSWORD: postgres
        run: psql -h 127.0.0.1 -U postgres -d home_decoration -f public.sql

      - name: Build user web
        working-directory: web
        env:
          VITE_APP_ENV: test
          VITE_API_URL: /api/v1
          VITE_ROUTER_BASENAME: /
          VITE_PUBLIC_SITE_URL: /
        run: npm run build

      - name: Start API
        env:
          APP_ENV: local
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 5432
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_DBNAME: home_decoration
          DATABASE_NAME: home_decoration
          DATABASE_SSLMODE: disable
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: deploy_test_verify_jwt_secret_2026
          SMS_PROVIDER: mock
          SMS_DEBUG_BYPASS: "true"
          SMS_RISK_ENABLED: "false"
        run: |
          cd server
          nohup go run ./cmd/api >/tmp/deploy-test-api.log 2>&1 &
          echo $! >/tmp/deploy-test-api.pid

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8080/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/deploy-test-api.log || true
          exit 1

      - name: Run verify:backend
        env:
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 5432
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_DBNAME: home_decoration
          DATABASE_NAME: home_decoration
          DATABASE_SSLMODE: disable
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: deploy_test_verify_jwt_secret_2026
        run: npm run verify:backend

      - name: Run smoke:test
        env:
          QUOTE_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/home_decoration?sslmode=disable
        run: npm run smoke:test

      - name: Print API log on failure
        if: failure()
        run: cat /tmp/deploy-test-api.log || true

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/deploy-test-api.pid ]; then
            kill "$(cat /tmp/deploy-test-api.pid)" || true
          fi

  deploy-test:
    name: Deploy to test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify-test-candidate

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TEST_SSH_KEY }}

      - name: Add server host key
        shell: bash
        env:
          TEST_HOST: ${{ secrets.TEST_HOST }}
          TEST_PORT: ${{ secrets.TEST_PORT }}
          TEST_KNOWN_HOSTS: ${{ secrets.TEST_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${TEST_HOST:?missing TEST_HOST}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [[ -n "${TEST_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "${TEST_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${TEST_PORT:-22}" -H "${TEST_HOST}" >> ~/.ssh/known_hosts
          fi

          chmod 600 ~/.ssh/known_hosts

      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.verify-test-candidate.outputs.deploy_ref }}

      - name: Resolve deploy commit
        id: deploy-meta
        shell: bash
        run: |
          set -euo pipefail
          echo "commit=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Sync workspace to test server
        shell: bash
        env:
          TEST_HOST: ${{ secrets.TEST_HOST }}
          TEST_PORT: ${{ secrets.TEST_PORT }}
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_APP_DIR: ${{ secrets.TEST_APP_DIR }}
        run: |
          set -euo pipefail
          : "${TEST_HOST:?missing TEST_HOST}"
          : "${TEST_USER:?missing TEST_USER}"
          : "${TEST_APP_DIR:?missing TEST_APP_DIR}"

          ssh -p "${TEST_PORT:-22}" "${TEST_USER}@${TEST_HOST}" "mkdir -p '${TEST_APP_DIR}'"

          rsync -az --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'dist/' \
            --exclude 'output/' \
            --exclude 'playwright-report/' \
            --exclude 'test-results/' \
            --exclude 'db_data_local/' \
            --exclude 'deploy/.env' \
            --exclude 'deploy/.env.test' \
            --exclude 'deploy/backups/' \
            --exclude 'deploy/state/' \
            --exclude 'server/uploads/' \
            --exclude 'server/uploads_test/' \
            -e "ssh -p ${TEST_PORT:-22}" \
            ./ "${TEST_USER}@${TEST_HOST}:${TEST_APP_DIR}/"

      - name: Run remote test deploy
        shell: bash
        env:
          TEST_HOST: ${{ secrets.TEST_HOST }}
          TEST_PORT: ${{ secrets.TEST_PORT }}
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_APP_DIR: ${{ secrets.TEST_APP_DIR }}
          RELEASE_COMMIT: ${{ steps.deploy-meta.outputs.commit }}
          SERVICE_SCOPE: ${{ needs.verify-test-candidate.outputs.service_scope }}
        run: |
          set -euo pipefail
          : "${TEST_HOST:?missing TEST_HOST}"
          : "${TEST_USER:?missing TEST_USER}"
          : "${TEST_APP_DIR:?missing TEST_APP_DIR}"
          : "${RELEASE_COMMIT:?missing RELEASE_COMMIT}"
          : "${SERVICE_SCOPE:?missing SERVICE_SCOPE}"

          ssh -p "${TEST_PORT:-22}" "${TEST_USER}@${TEST_HOST}" \
            "cd '${TEST_APP_DIR}' && RELEASE_COMMIT_OVERRIDE='${RELEASE_COMMIT}' bash deploy/scripts/deploy_test.sh --skip-git --skip-backup --service '${SERVICE_SCOPE}'"
