name: Backend CI

on:
  push:
    branches: [ "dev" ]
    paths:
      - 'server/**'
  pull_request:
    branches: [ "dev" ]
    paths:
      - 'server/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "postgres"
          POSTGRES_DB: home_decoration
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache-dependency-path: server/go.sum

    - name: Ensure Server Directory Exists
      run: if [ ! -d "." ]; then exit 1; fi

    - name: Install dependencies
      run: go mod download

    - name: Run vet & lint
      run: |
        go vet ./...
        # Optional: install and run golangci-lint if needed
        # curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2
        # $(go env GOPATH)/bin/golangci-lint run

    - name: Run tests
      env:
        APP_ENV: local
        DATABASE_HOST: localhost
        DATABASE_PORT: 5432
        DATABASE_USER: postgres
        DATABASE_PASSWORD: "postgres"
        DATABASE_DBNAME: home_decoration
        DATABASE_SSLMODE: disable
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        REDIS_PASSWORD: ""
        JWT_SECRET: "backend_ci_jwt_secret_for_tests_only"
      run: go test -v -race ./...
