name: Mobile CI

on:
  push:
    branches: [ "dev" ]
    paths:
      - 'mobile/**'
      - '.github/workflows/ci-mobile.yml'
  pull_request:
    branches: [ "dev" ]
    paths:
      - 'mobile/**'
      - '.github/workflows/ci-mobile.yml'

jobs:
  verify-mobile:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: mobile

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: mobile/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint
      continue-on-error: true # Not blocking build if there are lint warnings

    - name: Run tests
      run: npm test -- --no-watchman --runInBand
