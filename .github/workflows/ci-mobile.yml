name: Mobile CI

on:
  push:
    branches: [ "dev" ]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [ "dev" ]
    paths:
      - 'mobile/**'

jobs:
  build-web:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: mobile

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: mobile/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint
      continue-on-error: true # Not blocking build if there are lint warnings

    - name: Build Web
      run: npm run web:build
      env:
        VITE_API_URL: http://localhost:8080/api/v1
