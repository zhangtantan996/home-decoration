name: Mobile CI

on:
  push:
    branches: [ "dev" ]
    paths:
      - 'mobile/**'
      - 'shared/design-tokens/**'
      - 'scripts/frontend-style-guard.mjs'
      - 'scripts/frontend-style-baseline.json'
      - 'stylelint.config.cjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-mobile.yml'
  pull_request:
    branches: [ "dev" ]
    paths:
      - 'mobile/**'
      - 'shared/design-tokens/**'
      - 'scripts/frontend-style-guard.mjs'
      - 'scripts/frontend-style-baseline.json'
      - 'stylelint.config.cjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-mobile.yml'

jobs:
  verify-mobile:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          mobile/package-lock.json

    - name: Install root dependencies
      run: npm ci

    - name: Install mobile dependencies
      working-directory: mobile
      run: npm ci

    - name: Run verify:mobile
      run: npm run verify:mobile
