name: Supervisor CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["dev"]
    paths:
      - 'supervisor/**'
      - 'server/internal/handler/supervisor*.go'
      - 'server/internal/middleware/supervisor*.go'
      - 'server/internal/model/supervisor.go'
      - 'server/internal/service/supervisor*.go'
      - 'server/internal/router/router.go'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/verify-supervisor.sh'
      - 'scripts/testing/run_supervisor_apply_service_area_smoke.sh'
      - 'scripts/testing/supervisor_apply_service_area_smoke.mjs'
      - '.github/workflows/ci-supervisor.yml'
  pull_request:
    branches: ["dev"]
    paths:
      - 'supervisor/**'
      - 'server/internal/handler/supervisor*.go'
      - 'server/internal/middleware/supervisor*.go'
      - 'server/internal/model/supervisor.go'
      - 'server/internal/service/supervisor*.go'
      - 'server/internal/router/router.go'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/verify-supervisor.sh'
      - 'scripts/testing/run_supervisor_apply_service_area_smoke.sh'
      - 'scripts/testing/supervisor_apply_service_area_smoke.mjs'
      - '.github/workflows/ci-supervisor.yml'

jobs:
  verify-supervisor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            supervisor/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install supervisor dependencies
        working-directory: supervisor
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run verify:supervisor
        run: npm run verify:supervisor
        env:
          VITE_API_URL: http://localhost:8080/api/v1
