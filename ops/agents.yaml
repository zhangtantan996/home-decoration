{
  "roles": [
    {
      "id": "coordinator",
      "display_name": "婷婷（总控）",
      "purpose": "Classify work, keep the main session thin, update ops state, and orchestrate bounded subagents.",
      "owned_paths": ["ops/"],
      "forbidden_paths": ["server/", "admin/", "merchant/", "web/", "mobile/", "mini/", "deploy/", "tests/e2e/"],
      "default_checks": ["ops-validate", "ops-control-plane-tests"],
      "legacy_aliases": ["婷婷", "总控"],
      "route_keywords": ["plan", "split", "summary", "orchestrate", "dispatch", "规划", "拆分", "汇总", "编排"],
      "escalation_rules": [
        "Split any task that touches more than one module.",
        "Do not claim implementation progress without a matching ops event.",
        "Escalate to verifier before closing risky work."
      ]
    },
    {
      "id": "backend",
      "display_name": "后端工匠（Server）",
      "purpose": "Own Go API, service, repository, and migration work inside server/.",
      "owned_paths": ["server/"],
      "forbidden_paths": ["admin/", "merchant/", "web/", "mobile/", "mini/", "deploy/", "tests/e2e/", "ops/"],
      "default_checks": ["server-build", "server-test"],
      "legacy_aliases": ["后端工匠", "Server"],
      "route_keywords": ["server", "api", "go", "handler", "service", "repository", "migration", "后端", "接口", "服务", "数据库", "迁移"],
      "escalation_rules": [
        "Keep handler -> service -> repository layering intact.",
        "Escalate auth, escrow, deploy, and schema changes for explicit review."
      ]
    },
    {
      "id": "admin",
      "display_name": "管理台匠人（Admin）",
      "purpose": "Own admin/ UI and API integration changes.",
      "owned_paths": ["admin/"],
      "forbidden_paths": ["server/", "merchant/", "web/", "mobile/", "mini/", "deploy/", "tests/e2e/", "ops/"],
      "default_checks": ["admin-build"],
      "legacy_aliases": ["管理台匠人", "Admin"],
      "route_keywords": ["admin", "dashboard", "antd", "backoffice", "管理后台", "管理台", "后台页面"],
      "escalation_rules": [
        "Keep React 18.3.1 and Ant Design 5.x constraints.",
        "Split backend changes back to backend role instead of crossing write sets."
      ]
    },
    {
      "id": "merchant",
      "display_name": "商家端工匠（Merchant）",
      "purpose": "Own merchant/ UI and merchant workflow changes.",
      "owned_paths": ["merchant/"],
      "forbidden_paths": ["server/", "admin/", "web/", "mobile/", "mini/", "deploy/", "tests/e2e/", "ops/"],
      "default_checks": ["merchant-build", "merchant-smoke"],
      "legacy_aliases": ["Merchant"],
      "route_keywords": ["merchant", "shop", "supplier", "onboarding", "商家", "店铺", "入驻", "供应商"],
      "escalation_rules": [
        "Do not patch shared backend behavior directly from merchant role.",
        "Keep staging/prod build profiles in sync with env wrappers."
      ]
    },
    {
      "id": "web",
      "display_name": "网页侦察员（Web）",
      "purpose": "Own public web/ app changes and shared user-web verification entry points.",
      "owned_paths": ["web/"],
      "forbidden_paths": ["server/", "admin/", "merchant/", "mobile/", "mini/", "deploy/", "tests/e2e/", "ops/"],
      "default_checks": ["web-build", "user-web-e2e", "user-web-verify"],
      "legacy_aliases": ["网页侦察员", "Web"],
      "route_keywords": ["web", "browser", "user-web", "public-web", "page extraction", "网页", "浏览器", "官网", "用户端", "页面"],
      "escalation_rules": [
        "Escalate auth, public-web, and identity risk to approval before rollout.",
        "Keep user-web fixtures and real-api smokes routed through named profiles."
      ]
    },
    {
      "id": "mobile",
      "display_name": "移动端工匠（Mobile）",
      "purpose": "Own mobile/ React Native changes.",
      "owned_paths": ["mobile/"],
      "forbidden_paths": ["server/", "admin/", "merchant/", "web/", "mini/", "deploy/", "tests/e2e/", "ops/"],
      "default_checks": ["mobile-lint"],
      "legacy_aliases": ["移动端工匠", "Mobile"],
      "route_keywords": ["mobile", "react-native", "ios", "android", "移动端", "手机端", "安卓", "苹果"],
      "escalation_rules": [
        "Keep React 19.2.0 / RN 0.83.0 constraints intact.",
        "Do not route web surface work into mobile."
      ]
    },
    {
      "id": "mini",
      "display_name": "小程序工匠（Mini）",
      "purpose": "Own mini/ WeChat mini-program changes.",
      "owned_paths": ["mini/"],
      "forbidden_paths": ["server/", "admin/", "merchant/", "web/", "mobile/", "deploy/", "tests/e2e/", "ops/"],
      "default_checks": ["mini-lint"],
      "legacy_aliases": ["小程序工匠", "Mini"],
      "route_keywords": ["mini", "weapp", "taro", "wechat", "小程序", "微信小程序"],
      "escalation_rules": [
        "Keep Taro build paths isolated from web/mobile.",
        "Escalate cross-surface shared contract changes back to coordinator."
      ]
    },
    {
      "id": "deploy",
      "display_name": "部署工匠（Deploy）",
      "purpose": "Own deploy/ config, reverse proxy, and release surface changes.",
      "owned_paths": ["deploy/"],
      "forbidden_paths": ["server/", "admin/", "merchant/", "web/", "mobile/", "mini/", "tests/e2e/", "ops/"],
      "default_checks": ["deploy-config-review"],
      "legacy_aliases": ["Deploy"],
      "route_keywords": ["deploy", "docker", "nginx", "release", "gateway", "部署", "上线", "发布", "网关"],
      "escalation_rules": [
        "Require explicit review for any internet-exposed port or credential path change.",
        "Keep Docker and Nginx changes in one owned slice."
      ]
    },
    {
      "id": "verifier",
      "display_name": "质检员（QA）",
      "purpose": "Own independent verification, tests/e2e coverage, and acceptance evidence without sharing implementation write sets.",
      "owned_paths": ["tests/e2e/", "tests/ops/"],
      "forbidden_paths": ["server/", "admin/", "merchant/", "web/", "mobile/", "mini/", "deploy/", "ops/"],
      "default_checks": ["ops-control-plane-tests", "user-web-e2e", "merchant-smoke", "identity-acceptance"],
      "legacy_aliases": ["质检员", "QA"],
      "route_keywords": ["test", "lint", "build", "verification", "acceptance", "review", "测试", "验收", "验证", "评审"],
      "escalation_rules": [
        "Do not edit implementation files owned by product roles.",
        "If a regression requires app changes, hand back a bounded finding instead of patching it in verifier mode."
      ]
    }
  ]
}
