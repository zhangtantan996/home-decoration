{
  "project": {
    "name": "home-decoration",
    "type": "multi-surface-product",
    "primary_runtime": "openclaw",
    "docs_order": [
      "AGENTS.md",
      "docs/CLAUDE_DEV_GUIDE.md",
      "docs/TROUBLESHOOTING.md",
      "docs/Codex工作流.md",
      "SECURITY_QUICKSTART.md",
      "SECURITY_FIXES.md",
      "SECURITY_AUDIT_REPORT.md"
    ]
  },
  "modules": [
    {
      "id": "server",
      "paths": ["server/"],
      "owner_role": "backend",
      "default_risk": "auth",
      "verify_profiles": ["server-build", "server-test"]
    },
    {
      "id": "admin",
      "paths": ["admin/"],
      "owner_role": "admin",
      "default_risk": "identity",
      "verify_profiles": ["admin-build"]
    },
    {
      "id": "merchant",
      "paths": ["merchant/"],
      "owner_role": "merchant",
      "default_risk": "identity",
      "verify_profiles": ["merchant-build", "merchant-smoke"]
    },
    {
      "id": "web",
      "paths": ["web/"],
      "owner_role": "web",
      "default_risk": "public-web",
      "verify_profiles": ["web-build", "user-web-e2e", "user-web-verify"]
    },
    {
      "id": "mobile",
      "paths": ["mobile/"],
      "owner_role": "mobile",
      "default_risk": "identity",
      "verify_profiles": ["mobile-lint"]
    },
    {
      "id": "mini",
      "paths": ["mini/"],
      "owner_role": "mini",
      "default_risk": "identity",
      "verify_profiles": ["mini-lint"]
    },
    {
      "id": "deploy",
      "paths": ["deploy/"],
      "owner_role": "deploy",
      "default_risk": "deploy",
      "verify_profiles": ["deploy-config-review"]
    },
    {
      "id": "e2e",
      "paths": ["tests/e2e/"],
      "owner_role": "verifier",
      "default_risk": "identity",
      "verify_profiles": ["user-web-e2e", "merchant-smoke", "identity-acceptance"]
    }
  ],
  "risk_domains": [
    "auth",
    "escrow/payment",
    "identity",
    "deploy",
    "im",
    "public-web"
  ],
  "verify_profiles": [
    {
      "id": "ops-validate",
      "description": "Validate control-plane schemas and cross references",
      "cwd": ".",
      "command": ["node", "ops/validate.mjs"],
      "remote_allowed": true
    },
    {
      "id": "ops-control-plane-tests",
      "description": "Run control-plane automated tests",
      "cwd": ".",
      "command": [
        "node",
        "--test",
        "tests/ops/schema.test.mjs",
        "tests/ops/routing.test.mjs",
        "tests/ops/state-store.test.mjs",
        "tests/ops/remote.test.mjs",
        "tests/ops/engine.test.mjs"
      ],
      "remote_allowed": true
    },
    {
      "id": "server-build",
      "description": "Build the Go backend",
      "cwd": "server",
      "command": ["make", "build"],
      "remote_allowed": false
    },
    {
      "id": "server-test",
      "description": "Run backend tests",
      "cwd": "server",
      "command": ["make", "test"],
      "remote_allowed": false
    },
    {
      "id": "admin-build",
      "description": "Build admin frontend",
      "cwd": ".",
      "command": ["npm", "run", "build:admin:staging"],
      "remote_allowed": false
    },
    {
      "id": "merchant-build",
      "description": "Build merchant frontend",
      "cwd": ".",
      "command": ["npm", "run", "build:merchant:staging"],
      "remote_allowed": false
    },
    {
      "id": "merchant-smoke",
      "description": "Merchant onboarding smoke tests",
      "cwd": ".",
      "command": ["npm", "run", "test:e2e:merchant:smoke"],
      "remote_allowed": true
    },
    {
      "id": "web-build",
      "description": "Build public web",
      "cwd": ".",
      "command": ["npm", "run", "build:web"],
      "remote_allowed": true
    },
    {
      "id": "user-web-e2e",
      "description": "Run user web e2e suite",
      "cwd": ".",
      "command": ["npm", "run", "test:e2e:user-web"],
      "remote_allowed": true
    },
    {
      "id": "user-web-verify",
      "description": "Run full user web verification bundle",
      "cwd": ".",
      "command": ["npm", "run", "verify:user-web"],
      "remote_allowed": true
    },
    {
      "id": "identity-acceptance",
      "description": "Run identity acceptance checks",
      "cwd": ".",
      "command": ["npm", "run", "test:identity:acceptance"],
      "remote_allowed": true
    },
    {
      "id": "mobile-lint",
      "description": "Run mobile lint",
      "cwd": "mobile",
      "command": ["npm", "run", "lint"],
      "remote_allowed": false
    },
    {
      "id": "mini-lint",
      "description": "Run mini lint",
      "cwd": "mini",
      "command": ["npm", "run", "lint"],
      "remote_allowed": false
    },
    {
      "id": "deploy-config-review",
      "description": "Review deploy config through control-plane tests",
      "cwd": ".",
      "command": ["node", "ops/validate.mjs"],
      "remote_allowed": false
    }
  ],
  "remote": {
    "webui": {
      "enabled": true,
      "listen_host": "127.0.0.1",
      "listen_port": 7788,
      "approval_required_risks": ["auth", "escrow/payment", "deploy", "identity"],
      "features": ["tasks", "blockers", "decisions", "events", "approve", "handoff", "run-profile"]
    },
    "telegram": {
      "enabled": true,
      "allowed_actions": ["status", "summary", "blockers", "approve", "run", "handoff", "task"],
      "denied_actions": ["shell", "edit", "secret-read", "external-write"],
      "bot_token_env": "OPS_TELEGRAM_BOT_TOKEN",
      "chat_id_env": "OPS_TELEGRAM_CHAT_ID"
    }
  },
  "legacy_ignored": [
    "HEARTBEAT.md",
    "MEMORY.md",
    "docs/CCG_QUICK_REFERENCE.md",
    "docs/CCG_WORKFLOW_GUIDE.md",
    "docs/CCG_WORKFLOW_SCENARIOS.md",
    "openspec/",
    "scripts/openspec-dev.ps1",
    ".amazonq/prompts/openspec-apply.md",
    ".amazonq/prompts/openspec-archive.md",
    ".amazonq/prompts/openspec-proposal.md"
  ]
}
