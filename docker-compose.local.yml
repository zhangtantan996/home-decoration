services:
  # 数据库
  db:
    image: postgres:15-alpine
    container_name: home_decor_db_local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "IXwUBjxFia33XltiY0wFch8n3N68hptI"
      POSTGRES_DB: home_decoration
    ports:
      - "5432:5432"
    volumes:
      - ./db_data_local:/var/lib/postgresql/data
    networks:
      - dev-net

  # Redis
  redis:
    image: redis:6.2-alpine
    container_name: home_decor_redis_local
    command: redis-server --requirepass kXTSG3Q7yjug7I60JgOmWo6w9OIJrFUf
    ports:
      - "6380:6379"
    networks:
      - dev-net

  # 后端 API (热更新)
  api:
    build:
      context: ./server
      dockerfile: Dockerfile.api.dev
    container_name: home_decor_api_local
    depends_on:
      - db
      - redis
    volumes:
      - ./server:/app
    environment:
      - APP_ENV=local
      - SERVER_PUBLIC_URL=http://localhost:8080
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=IXwUBjxFia33XltiY0wFch8n3N68hptI
      - DATABASE_DBNAME=home_decoration
      - DATABASE_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=kXTSG3Q7yjug7I60JgOmWo6w9OIJrFUf
      - JWT_SECRET=jPsAHbLFCuvAkJtL9lsP/nYJLi0X3eIUhDN+uQ29NUI=
      # Tinode "token" authenticator configuration (must match Tinode container).
      - TINODE_AUTH_TOKEN_KEY=jPsAHbLFCuvAkJtL9lsP/nYJLi0X3eIUhDN+uQ29NUI=
      - TINODE_UID_ENCRYPTION_KEY=la6YsO+bNX/+XIkOqc5Svw==
    ports:
      - "8080:8080"
    networks:
      - dev-net

  # 管理后台 (Vite Dev)
  admin:
    build:
      context: .
      dockerfile: deploy/Dockerfile.node.dev
    container_name: home_decor_admin_local
    working_dir: /app/admin
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    environment:
      - APP_ENV=local
      - API_BASE_URL=http://localhost:8080
      - ADMIN_BASE_URL=http://localhost:5173
      - WEB_BASE_URL=http://localhost:5175
      - VITE_APP_ENV=local
      - VITE_API_URL=http://localhost:8080/api/v1
    command: sh -c "npm install --registry=https://registry.npmmirror.com/ --legacy-peer-deps && npm run dev -- --host"
    networks:
      - dev-net

  # 官网 (Vite Dev)
  website:
    build:
      context: .
      dockerfile: deploy/Dockerfile.node.dev
    container_name: home_decor_website_local
    working_dir: /app/website
    volumes:
      - .:/app
    ports:
      - "5175:5175"
    command: sh -c "npm install --registry=https://registry.npmmirror.com/ --legacy-peer-deps && npx vite --port 5175 --host"
    networks:
      - dev-net

  # 注意: Mobile 端仅用于原生 App 开发
  # 使用 React Native Metro (npm start) 和 Android Studio/Xcode
  # Web 版本已禁用，无需 Docker 容器

networks:
  dev-net:
    driver: bridge
