services:
  # 数据库
  db:
    image: postgres:15-alpine
    container_name: home_decor_db_local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-local_dev_db_password_change_me}
      POSTGRES_DB: home_decoration
    ports:
      - "5432:5432"
    volumes:
      - ./db_data_local:/var/lib/postgresql/data
    networks:
      - dev-net

  # Redis
  redis:
    image: redis:6.2-alpine
    container_name: home_decor_redis_local
    command: redis-server --requirepass ${REDIS_PASSWORD:-local_dev_redis_password_change_me}
    ports:
      - "6380:6379"
    networks:
      - dev-net

  # 后端 API (热更新)
  api:
    build:
      context: ./server
      dockerfile: Dockerfile.api.dev
    container_name: home_decor_api_local
    depends_on:
      - db
      - redis
    volumes:
      - ./server:/app
    environment:
      - APP_ENV=local
      - SERVER_PUBLIC_URL=http://localhost:8080
      - ALIPAY_ENABLED=${ALIPAY_ENABLED:-false}
      - ALIPAY_SANDBOX=${ALIPAY_SANDBOX:-false}
      - ALIPAY_GATEWAY_URL=${ALIPAY_GATEWAY_URL:-https://openapi.alipay.com/gateway.do}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_APP_PRIVATE_KEY=${ALIPAY_APP_PRIVATE_KEY:-}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
      - ALIPAY_NOTIFY_URL=${ALIPAY_NOTIFY_URL:-}
      - ALIPAY_RETURN_URL_WEB=${ALIPAY_RETURN_URL_WEB:-}
      - ALIPAY_RETURN_URL_H5=${ALIPAY_RETURN_URL_H5:-}
      - ALIPAY_TIMEOUT_MINUTES=${ALIPAY_TIMEOUT_MINUTES:-15}
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-local_dev_db_password_change_me}
      - DATABASE_DBNAME=home_decoration
      - DATABASE_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-local_dev_redis_password_change_me}
      - JWT_SECRET=${JWT_SECRET:-local_dev_jwt_secret_change_me}
      # Tinode "token" authenticator configuration (must match Tinode container).
      - TINODE_AUTH_TOKEN_KEY=${JWT_SECRET:-local_dev_jwt_secret_change_me}
      - TINODE_UID_ENCRYPTION_KEY=${TINODE_UID_ENCRYPTION_KEY:-MTIzNDU2Nzg5MGFiY2RlZg==}
    ports:
      - "8080:8080"
    networks:
      - dev-net

  # 管理后台 (Vite Dev)
  admin:
    build:
      context: .
      dockerfile: deploy/Dockerfile.node.dev
    container_name: home_decor_admin_local
    working_dir: /app/admin
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    environment:
      - APP_ENV=local
      - API_BASE_URL=http://localhost:8080
      - ADMIN_BASE_URL=http://localhost:5175/admin/
      - WEB_BASE_URL=http://localhost:5175/app/
      - VITE_APP_ENV=local
      - VITE_API_URL=/api/v1
      - VITE_ROUTER_BASENAME=/admin
      - VITE_DEV_WATCH_POLLING=true
    command: sh -c "npm install --registry=https://registry.npmmirror.com/ --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - dev-net

  # 商家中心 (Vite Dev)
  merchant:
    build:
      context: .
      dockerfile: deploy/Dockerfile.node.dev
    container_name: home_decor_merchant_local
    working_dir: /app/merchant
    volumes:
      - .:/app
    ports:
      - "5174:5174"
    environment:
      - APP_ENV=local
      - API_BASE_URL=http://localhost:8080
      - MERCHANT_BASE_URL=http://localhost:5175/merchant/
      - VITE_APP_ENV=local
      - VITE_API_URL=/api/v1
      - VITE_ROUTER_BASENAME=/merchant
      - VITE_DEV_WATCH_POLLING=true
    command: sh -c "npm install --registry=https://registry.npmmirror.com/ --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port 5174"
    networks:
      - dev-net

  # 官网 (Vite Dev)
  website:
    build:
      context: .
      dockerfile: deploy/Dockerfile.node.dev
    container_name: home_decor_website_local
    working_dir: /app/website
    volumes:
      - .:/app
    ports:
      - "5177:5175"
    environment:
      - VITE_USER_WEB_URL=http://localhost:5175/app/
      - VITE_MERCHANT_WEB_URL=http://localhost:5175/merchant/
      - VITE_DEV_WATCH_POLLING=true
    command: sh -c "npm install --registry=https://registry.npmmirror.com/ --legacy-peer-deps && npx vite --port 5175 --host"
    networks:
      - dev-net

  # 用户侧 Web (Vite Dev)
  user-web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.node.dev
    container_name: home_decor_user_web_local
    working_dir: /app/web
    volumes:
      - .:/app
    ports:
      - "5176:5176"
    environment:
      - APP_ENV=local
      - API_BASE_URL=http://localhost:8080
      - WEB_BASE_URL=http://localhost:5175/app/
      - WEBSITE_BASE_URL=http://localhost:5175
      - VITE_APP_ENV=local
      - VITE_API_URL=/api/v1
      - VITE_API_PROXY_TARGET=http://api:8080
      - VITE_ROUTER_BASENAME=/app
      - VITE_PUBLIC_SITE_URL=http://localhost:5175
      - VITE_DEV_WATCH_POLLING=true
    command: sh -c "npm install --registry=https://registry.npmmirror.com/ --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port 5176"
    networks:
      - dev-net

  # 本地统一入口网关 (Website + User Web + API)
  local-gateway:
    image: nginx:alpine
    container_name: home_decor_local_gateway
    depends_on:
      - admin
      - api
      - merchant
      - website
      - user-web
    volumes:
      - ./deploy/nginx/local_gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5175:80"
    networks:
      - dev-net

  # 注意: Mobile 端仅用于原生 App 开发
  # 使用 React Native Metro (npm start) 和 Android Studio/Xcode
  # Web 版本已禁用，无需 Docker 容器

networks:
  dev-net:
    driver: bridge
