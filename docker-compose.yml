services:
  # Database - PostgreSQL (matching server code)
  db:
    image: postgres:15-alpine
    container_name: decorating_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: home_decoration
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - decorating-net
  
  # Redis Cache
  redis:
    image: redis:6.2-alpine
    container_name: decorating_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - decorating-net

  # Go API Server
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: decorating_api
    restart: always
    depends_on:
      - db
      - redis
    volumes:
      - ./server/config.docker.yaml:/app/config.yaml:ro
    networks:
      - decorating-net

  # Frontend (Admin + Mobile + Nginx)
  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    container_name: decorating_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - decorating-net

volumes:
  db_data:
  redis_data:

networks:
  decorating-net:
    driver: bridge
