{
  "listen": ":6060",
  "grpc_listen": ":6061",
  "api_path": "/",
  "cache_control": 39600,
  "store_config": {
    "use_adapter": "postgres",
    "adapters": {
      "postgres": {
        "dsn": "${TINODE_DATABASE_DSN}"
      }
    }
  },
  "auth_config": {
    "token": {
      "key": "${TINODE_AUTH_TOKEN_KEY}",
      "expire_in": 604800
    },
    "basic": {
      "add_to_tags": true
    }
  },
  "push": [],
  "max_message_size": 4194304,
  "max_subscriber_count": 32,
  "max_tag_count": 16,
  "max_tag_length": 96,
  "media": {
    "use_handler": "fs",
    "max_size": 10485760,
    "gc_period": 60,
    "gc_block_size": 100,
    "handlers": {
      "fs": {
        "upload_dir": "/data/uploads"
      }
    }
  },
  "tls": {
    "enabled": false
  }
}
