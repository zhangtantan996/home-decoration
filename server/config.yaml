# 装修设计一体化平台 - 服务端配置

server:
  host: "0.0.0.0"
  port: "8080"
  mode: "debug"

database:
  host: "localhost"
  port: "5432"
  user: "postgres"
  password: "123456"
  dbname: "home_decoration"
