# 装修设计一体化平台 - 服务端配置
# ⚠️  注意：此文件为开发环境默认配置
# 生产环境请通过环境变量或 .env 文件覆盖敏感配置

server:
  host: "0.0.0.0"
  port: "8080"
  mode: "debug"  # 生产环境设置为 "release"
  public_url: "http://localhost:8080" # API 公网地址/入口地址

database:
  host: "localhost"
  port: "5432"
  user: "postgres"
  password: "${DATABASE_PASSWORD}"  # 从环境变量读取，不要硬编码！
  dbname: "home_decoration"
  sslmode: "disable"

redis:
  host: "localhost"
  port: "6380"
  password: "${REDIS_PASSWORD}"  # 从环境变量读取
  db: 0

jwt:
  secret: "${JWT_SECRET}"  # 从环境变量读取，不要硬编码！
  expire_hour: 8  # AccessToken 有效期（小时）

log:
  level: "info"
  file: "logs/backend.log"

wechat_mini:
  app_id: "${WECHAT_MINI_APPID}"
  app_secret: "${WECHAT_MINI_SECRET}"
  bind_token_expire_minutes: 5

wechat_h5:
  app_id: "${WECHAT_H5_APP_ID}"
  app_secret: "${WECHAT_H5_APP_SECRET}"
  bind_token_expire_minutes: 5
  oauth_scope: "${WECHAT_H5_OAUTH_SCOPE}"
  state_signing_secret: "${WECHAT_H5_STATE_SIGNING_SECRET}"

sms:
  provider: "${SMS_PROVIDER}" # mock | aliyun
  access_key_id: "${SMS_ACCESS_KEY_ID}"
  access_key_secret: "${SMS_ACCESS_KEY_SECRET}"
  sign_name: "${SMS_SIGN_NAME}"
  template_code: "${SMS_TEMPLATE_CODE}"
  region_id: "${SMS_REGION_ID}"
  debug_bypass: false
  risk_enabled: true
  code_max_attempts: 5
  phone_daily_limit: 10
  ip_daily_limit: 20
  captcha_enabled: false
  captcha_provider: "turnstile"
  captcha_verify_url: ""
  captcha_secret_key: ""
  captcha_timeout_ms: 3000
  captcha_min_score: 0.0
