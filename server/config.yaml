# 装修设计一体化平台 - 服务端配置

server:
  host: "0.0.0.0"
  port: "8080"
  mode: "debug"
  public_url: "http://localhost:8080" # API 公网地址/入口地址

database:
  host: "localhost"
  port: "5432"
  user: "postgres"
  password: "123456"
  dbname: "home_decoration"
  sslmode: "disable"

redis:
  host: "localhost"
  port: "6380"
  password: ""
  db: 0

jwt:
  secret: "${JWT_SECRET}" # 从环境变量读取，不要硬编码！
  expire_hour: 8 # 缩短至8小时

log:
  level: "info"
  file: "logs/backend.log"
