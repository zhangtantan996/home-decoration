# 装修设计一体化平台 - Docker 环境配置

server:
  host: "0.0.0.0"
  port: "8080"
  mode: "release"

database:
  host: "db"
  port: "5432"
  user: "postgres"
  password: ""  # 从环境变量 DATABASE_PASSWORD 自动读取
  dbname: "home_decoration"
  sslmode: "disable"

redis:
  host: "redis"
  port: "6379"
  password: ""  # 从环境变量 REDIS_PASSWORD 自动读取
  db: 0

jwt:
  secret: ""  # 从环境变量 JWT_SECRET 自动读取
  expire_hour: 8  # 8小时过期

log:
  level: "info"
  file: "logs/backend.log"

wechat_mini:
  app_id: "${WECHAT_MINI_APPID}"
  app_secret: "${WECHAT_MINI_SECRET}"
  bind_token_expire_minutes: 5

wechat_h5:
  app_id: "${WECHAT_H5_APP_ID}"
  app_secret: "${WECHAT_H5_APP_SECRET}"
  bind_token_expire_minutes: 5
  oauth_scope: "${WECHAT_H5_OAUTH_SCOPE}"
  state_signing_secret: "${WECHAT_H5_STATE_SIGNING_SECRET}"
  base_path: "/app"

alipay:
  enabled: false
  gateway_url: "${ALIPAY_GATEWAY_URL}"
  app_id: "${ALIPAY_APP_ID}"
  app_private_key: "${ALIPAY_APP_PRIVATE_KEY}"
  public_key: "${ALIPAY_PUBLIC_KEY}"
  notify_url: "${ALIPAY_NOTIFY_URL}"
  return_url_web: "${ALIPAY_RETURN_URL_WEB}"
  return_url_h5: "${ALIPAY_RETURN_URL_H5}"
  timeout_minutes: 15
  sandbox: false

sms:
  provider: "${SMS_PROVIDER}" # mock | aliyun
  access_key_id: "${SMS_ACCESS_KEY_ID}"
  access_key_secret: "${SMS_ACCESS_KEY_SECRET}"
  sign_name: "${SMS_SIGN_NAME}"
  template_code: "${SMS_TEMPLATE_CODE}"
  region_id: "${SMS_REGION_ID}"
  debug_bypass: false
  risk_enabled: true
  code_max_attempts: 5
  phone_daily_limit: 10
  ip_daily_limit: 20
  captcha_enabled: false
  captcha_provider: "turnstile"
  captcha_verify_url: ""
  captcha_secret_key: ""
  captcha_timeout_ms: 3000
  captcha_min_score: 0.0

notification_realtime:
  enabled: true
  max_connections_per_user: 5
  max_connections_per_ip: 50
  ping_interval_seconds: 30
  idle_timeout_seconds: 90
  send_buffer_size: 32
