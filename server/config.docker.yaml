# 装修设计一体化平台 - Docker 环境配置

server:
  host: "0.0.0.0"
  port: "8080"
  mode: "release"
  trusted_proxies: "${SERVER_TRUSTED_PROXIES}"

database:
  host: "db"
  port: "5432"
  user: "postgres"
  password: ""  # 从环境变量 DATABASE_PASSWORD 自动读取
  dbname: "home_decoration"
  sslmode: "disable"

redis:
  host: "redis"
  port: "6379"
  password: ""  # 从环境变量 REDIS_PASSWORD 自动读取
  db: 0

jwt:
  secret: ""  # 从环境变量 JWT_SECRET 自动读取
  expire_hour: 8  # 8小时过期

admin_auth:
  access_token_minutes: 30
  refresh_token_days: 7
  login_fail_limit: 5
  login_lock_minutes: 30
  password_min_length: 10
  password_max_age_days: 90
  totp_enabled: true
  totp_issuer: "禾泽云管理后台"
  required_role_keys: "${ADMIN_AUTH_2FA_REQUIRED_ROLE_KEYS}"
  reauth_ttl_minutes: 10
  max_active_sessions: 5
  api_ip_enforced: true
  allowed_cidrs: "${ADMIN_AUTH_ALLOWED_CIDRS}"

log:
  level: "info"
  file: "logs/backend.log"
  audit_retention_days: 180

storage:
  driver: "${STORAGE_DRIVER}"
  oss_endpoint: "${STORAGE_OSS_ENDPOINT}"
  oss_access_key_id: "${STORAGE_OSS_ACCESS_KEY_ID}"
  oss_access_key_secret: "${STORAGE_OSS_ACCESS_KEY_SECRET}"
  oss_bucket: "${STORAGE_OSS_BUCKET}"
  public_base_url: "${STORAGE_PUBLIC_BASE_URL}"

wechat_mini:
  app_id: "${WECHAT_MINI_APPID}"
  app_secret: "${WECHAT_MINI_SECRET}"
  bind_token_expire_minutes: 5

wechat_h5:
  app_id: "${WECHAT_H5_APP_ID}"
  app_secret: "${WECHAT_H5_APP_SECRET}"
  bind_token_expire_minutes: 5
  oauth_scope: "${WECHAT_H5_OAUTH_SCOPE}"
  state_signing_secret: "${WECHAT_H5_STATE_SIGNING_SECRET}"
  base_path: "/app"

wechat_pay:
  app_id: "${WECHAT_PAY_APP_ID}"
  mch_id: "${WECHAT_PAY_MCH_ID}"
  serial_no: "${WECHAT_PAY_SERIAL_NO}"
  private_key: "${WECHAT_PAY_PRIVATE_KEY}"
  api_v3_key: "${WECHAT_PAY_API_V3_KEY}"
  notify_url: "${WECHAT_PAY_NOTIFY_URL}"
  platform_public_key_id: "${WECHAT_PAY_PLATFORM_PUBLIC_KEY_ID}"
  platform_public_key: "${WECHAT_PAY_PLATFORM_PUBLIC_KEY}"
  timeout_minutes: 15

alipay:
  enabled: false
  gateway_url: "${ALIPAY_GATEWAY_URL}"
  app_id: "${ALIPAY_APP_ID}"
  app_private_key: "${ALIPAY_APP_PRIVATE_KEY}"
  public_key: "${ALIPAY_PUBLIC_KEY}"
  notify_url: "${ALIPAY_NOTIFY_URL}"
  return_url_web: "${ALIPAY_RETURN_URL_WEB}"
  return_url_h5: "${ALIPAY_RETURN_URL_H5}"
  timeout_minutes: 15
  sandbox: false

sms:
  provider: "${SMS_PROVIDER}" # mock | aliyun
  access_key_id: "${SMS_ACCESS_KEY_ID}"
  access_key_secret: "${SMS_ACCESS_KEY_SECRET}"
  sign_name: "${SMS_SIGN_NAME}"
  template_code: "${SMS_TEMPLATE_CODE}"
  template_code_login: "${SMS_TEMPLATE_CODE_LOGIN}"
  template_code_register: "${SMS_TEMPLATE_CODE_REGISTER}"
  template_code_identity_apply: "${SMS_TEMPLATE_CODE_IDENTITY_APPLY}"
  template_code_merchant_withdraw: "${SMS_TEMPLATE_CODE_MERCHANT_WITHDRAW}"
  template_code_merchant_bank_bind: "${SMS_TEMPLATE_CODE_MERCHANT_BANK_BIND}"
  template_code_merchant_apply_approved: "${SMS_TEMPLATE_CODE_MERCHANT_APPLY_APPROVED}"
  template_code_merchant_apply_rejected: "${SMS_TEMPLATE_CODE_MERCHANT_APPLY_REJECTED}"
  template_code_change_phone: "${SMS_TEMPLATE_CODE_CHANGE_PHONE}"
  template_code_delete_account: "${SMS_TEMPLATE_CODE_DELETE_ACCOUNT}"
  region_id: "${SMS_REGION_ID}"
  debug_bypass: false
  risk_enabled: true
  code_max_attempts: 5
  phone_daily_limit: 10
  ip_daily_limit: 20
  captcha_enabled: false
  captcha_provider: "turnstile"
  captcha_verify_url: ""
  captcha_secret_key: ""
  captcha_timeout_ms: 3000
  captcha_min_score: 0.0

notification_realtime:
  enabled: true
  max_connections_per_user: 5
  max_connections_per_ip: 50
  ping_interval_seconds: 30
  idle_timeout_seconds: 90
  send_buffer_size: 32
