services:
  db:
    image: docker.m.daocloud.io/library/postgres:15-alpine
    container_name: test_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD not set}
      POSTGRES_DB: ${DB_NAME:-home_decoration_test}
    volumes:
      - db_data_test:/var/lib/postgresql/data
    networks:
      - test-net

  redis:
    image: docker.m.daocloud.io/library/redis:6.2-alpine
    container_name: test_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD not set}
    volumes:
      - redis_data_test:/data
    networks:
      - test-net

  api:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.backend
    container_name: test_api
    restart: always
    environment:
      APP_ENV: test
      SERVER_MODE: release
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:?SERVER_PUBLIC_URL not set}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DB_USER:-postgres}
      DATABASE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD not set}
      DATABASE_DBNAME: ${DB_NAME:-home_decoration_test}
      DATABASE_SSLMODE: disable
      DATABASE_AUTO_MIGRATE: ${DATABASE_AUTO_MIGRATE:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD not set}
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET not set}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY not set}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      SMS_ACCESS_KEY_ID: ${SMS_ACCESS_KEY_ID:-}
      SMS_ACCESS_KEY_SECRET: ${SMS_ACCESS_KEY_SECRET:-}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-}
      SMS_TEMPLATE_CODE: ${SMS_TEMPLATE_CODE:-}
      SMS_REGION_ID: ${SMS_REGION_ID:-cn-hangzhou}
      TINODE_UID_ENCRYPTION_KEY: ${TINODE_UID_ENCRYPTION_KEY:-}
      TINODE_AUTH_TOKEN_KEY: ${TINODE_AUTH_TOKEN_KEY:-}
    volumes:
      - ${UPLOADS_DIR:-../server/uploads_test}:/app/uploads
    depends_on:
      - db
      - redis
    networks:
      - test-net

  web:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_APP_ENV: ${VITE_APP_ENV:-test}
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-/}
    container_name: test_web
    restart: always
    ports:
      - "127.0.0.1:${WEB_PORT:-8889}:8888"
    volumes:
      - ./nginx/admin_allowlist.conf:/etc/nginx/admin_allowlist.conf:ro
      - ./nginx/admin.htpasswd:/etc/nginx/admin.htpasswd:ro
    depends_on:
      - api
    networks:
      - test-net

volumes:
  db_data_test:
  redis_data_test:

networks:
  test-net:
    driver: bridge
