services:
  # Database logic: use RDS/Cloud DB in production. 
  # This service is kept for "Complete Self-Hosted" option or testing.
  # In true production, remove this and point api to RDS.
  db:
    image: postgres:15-alpine
    container_name: prod_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword}
      POSTGRES_DB: ${DB_NAME:-home_decoration}
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    networks:
      - prod-net

  redis:
    image: redis:6.2-alpine
    container_name: prod_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-secureredispassword}
    volumes:
      - redis_data_prod:/data
    networks:
      - prod-net

  api:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.backend
    container_name: prod_api
    restart: always
    environment:
      - SERVER_MODE=release
      - DB_HOST=db
      - DB_PASSWORD=${DB_PASSWORD:-securepassword}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-secureredispassword}
    depends_on:
      - db
      - redis
    networks:
      - prod-net

  web:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.frontend
    container_name: prod_web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - prod-net

volumes:
  db_data_prod:
  redis_data_prod:

networks:
  prod-net:
    driver: bridge
