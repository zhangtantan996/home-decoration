services:
  # ⚠️  生产环境数据库配置说明
  # 推荐使用云数据库服务（如 AWS RDS, 阿里云 RDS, 腾讯云 CDB）
  # 如需自托管，请务必：
  # 1. 设置强密码环境变量（至少16字符，包含大小写字母、数字、特殊字符）
  # 2. 限制数据库端口仅对内网开放，不要暴露到公网
  # 3. 定期备份数据库
  db:
    image: postgres:15-alpine
    container_name: prod_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      # ⚠️ 必须设置环境变量 DB_PASSWORD
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD not set}
      POSTGRES_DB: ${DB_NAME:-home_decoration}
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    networks:
      - prod-net

  redis:
    image: redis:6.2-alpine
    container_name: prod_redis
    restart: always
    # ⚠️ 必须设置环境变量 REDIS_PASSWORD
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD not set}
    volumes:
      - redis_data_prod:/data
    networks:
      - prod-net

  api:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.backend
    container_name: prod_api
    restart: always
    environment:
      - SERVER_MODE=release
      - DB_HOST=db
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD not set}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD not set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET not set}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY not set}
    depends_on:
      - db
      - redis
    networks:
      - prod-net

  web:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.frontend
    container_name: prod_web
    restart: always
    ports:
      - "8888:8888"
      - "443:443"
    volumes:
      # Manually maintain admin access rules/credentials without rebuilding image.
      - ./nginx/admin_allowlist.conf:/etc/nginx/admin_allowlist.conf:ro
      - ./nginx/admin.htpasswd:/etc/nginx/admin.htpasswd:ro
    depends_on:
      - api
    networks:
      - prod-net

volumes:
  db_data_prod:
  redis_data_prod:

networks:
  prod-net:
    driver: bridge
