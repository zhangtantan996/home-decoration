server {
    listen 8888;
    server_name localhost;

    # Gzip Compression
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location ~* ^/(?:[^/]+/)*(?:\.env(?:\..*)?|\.git(?:/|$)|\.svn(?:/|$)|\.hg(?:/|$)|swagger(?:/|$)|swagger-ui(?:/|$)|api-docs(?:/|$)|openapi(?:\.(?:json|ya?ml))?) {
        return 404;
    }

    # Admin - using location with root instead of alias
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # Admin without trailing slash - redirect to with slash
    location = /admin {
        return 301 /admin/;
    }

    location /merchant/ {
        alias /usr/share/nginx/html/merchant/;
        index index.html;
        try_files $uri $uri/ /merchant/index.html;
    }

    location = /merchant {
        return 301 /merchant/;
    }

    location = /app {
        return 301 /;
    }

    location ^~ /app/ {
        rewrite ^/app/?(.*)$ /$1 permanent;
    }

    location = / {
        root /usr/share/nginx/html/web;
        try_files /index.html =404;
    }

    location / {
        root /usr/share/nginx/html/web;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to 'api' service
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
