# Test host Nginx template (Ubuntu: /etc/nginx/sites-available/home-decoration-test)
#
# Purpose:
# - Keep test host routing fully isolated from production
# - Proxy test traffic to Docker web container bound on 127.0.0.1:8889 by default
#
# Replace:
# - <TEST_DOMAIN> with your test root domain, e.g. test.example.com
# - <TEST_ADMIN_HOST> with admin-test.example.com
# - <TEST_API_HOST> with api-test.example.com
# - SSL certificate paths if TLS is enabled

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream home_decoration_test_web {
    server 127.0.0.1:8889;
}

server {
    listen 80;
    server_name <TEST_DOMAIN> www.<TEST_DOMAIN> <TEST_ADMIN_HOST> <TEST_API_HOST>;

    location / {
        proxy_pass http://home_decoration_test_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
