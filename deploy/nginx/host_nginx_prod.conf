# Host Nginx template (Ubuntu: /etc/nginx/sites-available/home-decoration)
#
# Purpose:
# - Terminate TLS on ECS host (Let's Encrypt or Aliyun cert)
# - Proxy to Docker web container bound on 127.0.0.1:8888
#
# Replace:
# - <DOMAIN> with your root domain, e.g. example.com
# - <ADMIN_HOST> with admin.<DOMAIN>
# - <API_HOST> with api.<DOMAIN>
# - SSL certificate paths

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream home_decoration_web {
    server 127.0.0.1:8888;
}

server {
    listen 80;
    server_name <ADMIN_HOST> <API_HOST>;

    # ACME HTTP-01 (certbot) challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name <ADMIN_HOST>;

    ssl_certificate     /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;

    location / {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name <API_HOST>;

    ssl_certificate     /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;

    # Only expose API/Tinode/Uploads on the API domain.
    location /api/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tinode/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        return 404;
    }
}

