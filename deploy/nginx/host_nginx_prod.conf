# Host Nginx template (Ubuntu: /etc/nginx/sites-available/home-decoration)
#
# Purpose:
# - Terminate TLS on ECS host (Let's Encrypt or Aliyun cert)
# - Proxy to Docker web container bound on 127.0.0.1:8888
#
# Replace:
# - <DOMAIN> with your root domain, e.g. example.com
# - <ADMIN_HOST> with admin.<DOMAIN>
# - <API_HOST> with api.<DOMAIN>
# - SSL certificate paths
# - /etc/nginx/admin_allowlist.conf 中的真实办公/VPN 网段
# - /etc/nginx/admin.htpasswd 中的 BasicAuth 账号

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

limit_req_zone $binary_remote_addr zone=admin_login_per_ip:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=admin_refresh_per_ip:10m rate=15r/m;
limit_req_zone $binary_remote_addr zone=admin_recovery_per_ip:10m rate=3r/m;

upstream home_decoration_web {
    server 127.0.0.1:8888;
}

server {
    listen 80;
    server_name <DOMAIN> www.<DOMAIN> <ADMIN_HOST> <API_HOST>;

    # ACME HTTP-01 (certbot) challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name <DOMAIN> www.<DOMAIN>;

    ssl_certificate     /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;

    location = /admin {
        return 301 https://<ADMIN_HOST>/admin/;
    }

    location ^~ /admin/ {
        return 301 https://<ADMIN_HOST>$request_uri;
    }

    location ^~ /api/ {
        return 404;
    }

    location ^~ /uploads/ {
        return 404;
    }

    location ^~ /static/ {
        return 404;
    }

    location ^~ /tinode/ {
        return 404;
    }

    location ^~ /v0/ {
        return 404;
    }

    location / {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

server {
    listen 443 ssl http2;
    server_name <ADMIN_HOST>;

    ssl_certificate     /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;

    location = /merchant {
        return 301 https://<DOMAIN>/merchant/;
    }

    location ^~ /merchant/ {
        return 301 https://<DOMAIN>$request_uri;
    }

    location ^~ /api/ {
        return 404;
    }

    location ^~ /uploads/ {
        return 404;
    }

    location ^~ /static/ {
        return 404;
    }

    location ^~ /tinode/ {
        return 404;
    }

    location ^~ /v0/ {
        return 404;
    }

    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/ {
        include /etc/nginx/admin_allowlist.conf;
        auth_basic "Admin Access";
        auth_basic_user_file /etc/nginx/admin.htpasswd;
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl http2;
    server_name <API_HOST>;

    ssl_certificate     /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;

    location = /api/v1/realtime/notifications {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location = /api/v1/admin/login {
        include /etc/nginx/admin_allowlist.conf;
        limit_req zone=admin_login_per_ip burst=10 nodelay;
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/admin/token/refresh {
        include /etc/nginx/admin_allowlist.conf;
        limit_req zone=admin_refresh_per_ip burst=20 nodelay;
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/v1/admin/security/2fa/recovery/ {
        include /etc/nginx/admin_allowlist.conf;
        limit_req zone=admin_recovery_per_ip burst=5 nodelay;
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/v1/admin/ {
        include /etc/nginx/admin_allowlist.conf;
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Only expose API/Tinode/Uploads/Static on the API domain.
    location /api/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tinode/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /v0/channels {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /v0/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
