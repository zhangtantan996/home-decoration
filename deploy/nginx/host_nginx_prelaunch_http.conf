# Pre-launch HTTP-only host Nginx config for hezeyunchuang.com domains.
# Use this before SSL certificates are ready.
# Suggested path: /etc/nginx/sites-available/home-decoration-prelaunch

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream home_decoration_web {
    server 127.0.0.1:8888;
}

server {
    listen 80;
    server_name hezeyunchuang.com www.hezeyunchuang.com;

    location = /admin {
        return 301 http://admin.hezeyunchuang.com/admin/;
    }

    location ^~ /admin/ {
        return 301 http://admin.hezeyunchuang.com$request_uri;
    }

    location ^~ /api/ {
        return 404;
    }

    location ^~ /uploads/ {
        return 404;
    }

    location ^~ /static/ {
        return 404;
    }

    location ^~ /tinode/ {
        return 404;
    }

    location ^~ /v0/ {
        return 404;
    }

    location / {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name admin.hezeyunchuang.com;

    location = / {
        return 302 /admin/;
    }

    location = /merchant {
        return 301 http://hezeyunchuang.com/merchant/;
    }

    location ^~ /merchant/ {
        return 301 http://hezeyunchuang.com$request_uri;
    }

    location ^~ /api/ {
        return 404;
    }

    location ^~ /uploads/ {
        return 404;
    }

    location ^~ /static/ {
        return 404;
    }

    location ^~ /tinode/ {
        return 404;
    }

    location ^~ /v0/ {
        return 404;
    }

    location / {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.hezeyunchuang.com;

    client_max_body_size 60m;

    location /api/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tinode/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /v0/channels {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /v0/ {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
