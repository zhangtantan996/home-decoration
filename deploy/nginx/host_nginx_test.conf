# Host Nginx template for test environment (Ubuntu: /etc/nginx/sites-available/home-decoration-test)
#
# Purpose:
# - Terminate TLS for test domains on host Nginx
# - Proxy only test traffic to Docker web container bound on 127.0.0.1:8889
# - Keep test/prod routing fully isolated on the same host
#
# Replace:
# - <TEST_DOMAIN> with your test root domain, e.g. test.example.com
# - <TEST_ADMIN_HOST> with admin-test.example.com
# - <TEST_API_HOST> with api-test.example.com
# - SSL certificate paths

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream home_decoration_test_web {
    server 127.0.0.1:8889;
}

server {
    listen 80;
    server_name <TEST_DOMAIN> www.<TEST_DOMAIN> <TEST_ADMIN_HOST> <TEST_API_HOST>;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name <TEST_DOMAIN> www.<TEST_DOMAIN>;

    ssl_certificate     /etc/letsencrypt/live/<TEST_DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<TEST_DOMAIN>/privkey.pem;

    location / {
        proxy_pass http://home_decoration_test_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

server {
    listen 443 ssl http2;
    server_name <TEST_ADMIN_HOST>;

    ssl_certificate     /etc/letsencrypt/live/<TEST_DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<TEST_DOMAIN>/privkey.pem;

    location / {
        proxy_pass http://home_decoration_test_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

server {
    listen 443 ssl http2;
    server_name <TEST_API_HOST>;

    ssl_certificate     /etc/letsencrypt/live/<TEST_DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<TEST_DOMAIN>/privkey.pem;

    location = /api/v1/realtime/notifications {
        proxy_pass http://home_decoration_test_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /api/ {
        proxy_pass http://home_decoration_test_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://home_decoration_test_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://home_decoration_test_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tinode/ {
        proxy_pass http://home_decoration_test_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /v0/channels {
        proxy_pass http://home_decoration_test_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /v0/ {
        proxy_pass http://home_decoration_test_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
