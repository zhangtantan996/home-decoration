# Admin access allowlist (production)
# Replace these entries with your office/public egress IPs.
# Example:
# allow 203.0.113.10;
# allow 198.51.100.24;

# Keep localhost for emergency maintenance on the deployment host.
allow 127.0.0.1;
allow ::1;
allow 149.28.151.140;

# Deny everything else by default.
deny all;
