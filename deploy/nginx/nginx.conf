user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    gzip  on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/json;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream backend {
        server api:8080;
    }

    server {
        listen       8888;
        server_name  hezeyunchuang.com www.hezeyunchuang.com;

        root   /usr/share/nginx/html/web;
        index  index.html index.htm;

        location /api/ {
            return 404;
        }

        location /uploads/ {
            return 404;
        }

        location /tinode/ {
            return 404;
        }

        location /v0/ {
            return 404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    server {
        listen       8888;
        server_name  admin.hezeyunchuang.com;

        location = / {
            return 302 /admin/;
        }

        location = /admin {
            return 301 /admin/;
        }

        location ^~ /admin/ {
            include /etc/nginx/admin_allowlist.conf;
            auth_basic "Admin Access";
            auth_basic_user_file /etc/nginx/admin.htpasswd;
            alias   /usr/share/nginx/html/admin/;
            index  index.html index.htm;
            try_files $uri $uri/ /admin/index.html;
        }

        location / {
            return 302 /admin/;
        }
    }

    server {
        listen       8888;
        server_name  api.hezeyunchuang.com;

        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://backend/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /tinode/v0/ {
            proxy_pass http://backend/tinode/v0/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /tinode/ws {
            proxy_pass http://backend/tinode/ws;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /v0/channels {
            proxy_pass http://backend/v0/channels;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /v0/ {
            proxy_pass http://backend/v0/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /tinode/file/ {
            proxy_pass http://backend/tinode/file/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            return 404;
        }
    }

    server {
        listen       8888 default_server;
        server_name  _;

        return 404;
    }
}
