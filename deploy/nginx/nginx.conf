user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    gzip  on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/json;
    client_max_body_size 60m;

    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $host $website_host_target {
        default hezeyunchuang.com;
        test.hezeyunchuang.com test.hezeyunchuang.com;
        admin-test.hezeyunchuang.com test.hezeyunchuang.com;
    }

    map $host $admin_host_target {
        default admin.hezeyunchuang.com;
        test.hezeyunchuang.com admin-test.hezeyunchuang.com;
        admin-test.hezeyunchuang.com admin-test.hezeyunchuang.com;
    }

    upstream backend {
        server api:8080;
    }

    server {
        listen       8888;
        server_name  hezeyunchuang.com www.hezeyunchuang.com test.hezeyunchuang.com;

        root   /usr/share/nginx/html/website;
        index  index.html index.htm;

        location = /admin {
            return 301 http://$admin_host_target/admin/;
        }

        location ^~ /admin/ {
            return 301 http://$admin_host_target$request_uri;
        }

        location ^~ /api/ {
            return 404;
        }

        location ^~ /uploads/ {
            return 404;
        }

        location ^~ /static/ {
            return 404;
        }

        location ^~ /tinode/ {
            return 404;
        }

        location ^~ /v0/ {
            return 404;
        }

        location = /merchant {
            return 301 /merchant/;
        }

        location ^~ /merchant/ {
            alias /usr/share/nginx/html/merchant/;
            try_files $uri $uri/ /merchant/index.html;
        }

        location = /app {
            return 301 /app/;
        }

        location ^~ /app/ {
            alias /usr/share/nginx/html/web/;
            try_files $uri $uri/ /app/index.html;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    server {
        listen       8888;
        server_name  admin.hezeyunchuang.com admin-test.hezeyunchuang.com;

        location = / {
            return 302 /admin/;
        }

        location = /merchant {
            return 301 http://$website_host_target/merchant/;
        }

        location ^~ /merchant/ {
            return 301 http://$website_host_target$request_uri;
        }

        location ^~ /api/ {
            return 404;
        }

        location ^~ /uploads/ {
            return 404;
        }

        location ^~ /static/ {
            return 404;
        }

        location ^~ /tinode/ {
            return 404;
        }

        location ^~ /v0/ {
            return 404;
        }

        location = /admin {
            return 301 /admin/;
        }

        location ^~ /admin/ {
            alias /usr/share/nginx/html/admin/;
            try_files $uri $uri/ /admin/index.html;
        }

        location / {
            return 404;
        }
    }

    server {
        listen       8888;
        server_name  api.hezeyunchuang.com api-test.hezeyunchuang.com;

        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://backend/uploads/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            proxy_pass http://backend/static/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /tinode/v0/ {
            proxy_pass http://backend/tinode/v0/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /tinode/ws {
            proxy_pass http://backend/tinode/ws;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /v0/channels {
            proxy_pass http://backend/v0/channels;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /v0/ {
            proxy_pass http://backend/v0/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /tinode/file/ {
            proxy_pass http://backend/tinode/file/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            return 404;
        }
    }

    server {
        listen       8888 default_server;
        server_name  _;

        location / {
            return 404;
        }
    }
}
