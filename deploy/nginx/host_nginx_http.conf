# HTTP-first temporary host Nginx template.
# Use this before TLS certificates are ready, then switch to host_nginx_prod.conf.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream home_decoration_web {
    server 127.0.0.1:8888;
}

server {
    listen 80;
    server_name hezeyunchuang.com www.hezeyunchuang.com admin.hezeyunchuang.com api.hezeyunchuang.com;

    location / {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
