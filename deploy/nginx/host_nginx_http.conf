# HTTP-first temporary host Nginx template.
# Use this before TLS certificates are ready, then switch to host_nginx_prod.conf.
#
# Replace:
# - <DOMAIN> with your root domain, e.g. example.com
# - <ADMIN_HOST> with admin.<DOMAIN>
# - <API_HOST> with api.<DOMAIN>

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream home_decoration_web {
    server 127.0.0.1:8888;
}

server {
    listen 80;
    server_name <DOMAIN> www.<DOMAIN>;

    location = /admin {
        return 301 http://<ADMIN_HOST>/admin/;
    }

    location ^~ /admin/ {
        return 301 http://<ADMIN_HOST>$request_uri;
    }

    location ^~ /api/ {
        return 404;
    }

    location ^~ /uploads/ {
        return 404;
    }

    location ^~ /static/ {
        return 404;
    }

    location ^~ /tinode/ {
        return 404;
    }

    location ^~ /v0/ {
        return 404;
    }

    location / {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

server {
    listen 80;
    server_name <ADMIN_HOST>;

    location = / {
        return 302 /admin/;
    }

    location = /merchant {
        return 301 http://<DOMAIN>/merchant/;
    }

    location ^~ /merchant/ {
        return 301 http://<DOMAIN>$request_uri;
    }

    location ^~ /api/ {
        return 404;
    }

    location ^~ /uploads/ {
        return 404;
    }

    location ^~ /static/ {
        return 404;
    }

    location ^~ /tinode/ {
        return 404;
    }

    location ^~ /v0/ {
        return 404;
    }

    location / {
        proxy_pass http://home_decoration_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
