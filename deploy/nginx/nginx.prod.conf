user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    gzip  on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/x-javascript application/xml text/javascript application/json;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    limit_req_zone $binary_remote_addr zone=admin_login_per_ip:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=admin_refresh_per_ip:10m rate=15r/m;
    limit_req_zone $binary_remote_addr zone=admin_recovery_per_ip:10m rate=3r/m;

    upstream backend {
        server api:8080;
    }

    upstream tinode_http {
        server tinode:6060;
    }

    upstream tinode_ws {
        server tinode:6060;
    }

    server {
        listen       8888;
        server_name  hezeyunchuang.com www.hezeyunchuang.com;
        client_max_body_size 60m;

        root   /usr/share/nginx/html/website;
        index  index.html index.htm;

        location = /admin {
            return 301 https://admin.hezeyunchuang.com/admin/;
        }

        location ^~ /admin/ {
            return 301 https://admin.hezeyunchuang.com$request_uri;
        }

        location ^~ /api/ {
            return 404;
        }

        location ^~ /uploads/ {
            return 404;
        }

        location ^~ /static/ {
            return 404;
        }

        location ^~ /tinode/ {
            return 404;
        }

        location ^~ /v0/ {
            return 404;
        }

        location = /merchant {
            return 301 /merchant/;
        }

        location ^~ /merchant/ {
            alias /usr/share/nginx/html/merchant/;
            try_files $uri $uri/ /merchant/index.html;
        }

        location = /app {
            return 301 /app/;
        }

        location ^~ /app/ {
            alias /usr/share/nginx/html/web/;
            try_files $uri $uri/ /app/index.html;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    server {
        listen       8888;
        server_name  admin.hezeyunchuang.com;
        client_max_body_size 60m;

        location = / {
            return 302 /admin/;
        }

        location = /merchant {
            return 301 https://hezeyunchuang.com/merchant/;
        }

        location ^~ /merchant/ {
            return 301 https://hezeyunchuang.com$request_uri;
        }

        location ^~ /api/ {
            return 404;
        }

        location ^~ /uploads/ {
            return 404;
        }

        location ^~ /static/ {
            return 404;
        }

        location ^~ /tinode/ {
            return 404;
        }

        location ^~ /v0/ {
            return 404;
        }

        location = /admin {
            return 301 /admin/;
        }

        location ^~ /admin/ {
            include /etc/nginx/admin_allowlist.conf;
            auth_basic "Admin Access";
            auth_basic_user_file /etc/nginx/admin.htpasswd;
            alias /usr/share/nginx/html/admin/;
            try_files $uri $uri/ /admin/index.html;
        }

        location / {
            return 404;
        }
    }

    server {
        listen       8888;
        server_name  api.hezeyunchuang.com;
        client_max_body_size 60m;

        location = /api/v1/realtime/notifications {
            proxy_pass http://backend/api/v1/realtime/notifications;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location = /api/v1/admin/login {
            include /etc/nginx/admin_allowlist.conf;
            limit_req zone=admin_login_per_ip burst=10 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/v1/admin/token/refresh {
            include /etc/nginx/admin_allowlist.conf;
            limit_req zone=admin_refresh_per_ip burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/v1/admin/security/2fa/recovery/ {
            include /etc/nginx/admin_allowlist.conf;
            limit_req zone=admin_recovery_per_ip burst=5 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/v1/admin/ {
            include /etc/nginx/admin_allowlist.conf;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://backend/uploads/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            proxy_pass http://backend/static/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /tinode/v0/ {
            proxy_pass http://tinode_http/v0/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /tinode/ws {
            proxy_pass http://tinode_ws/v0/channels;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location /v0/channels {
            proxy_pass http://tinode_ws/v0/channels;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location /v0/ {
            proxy_pass http://tinode_http/v0/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /tinode/file/ {
            proxy_pass http://tinode_http/v0/file/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            return 404;
        }
    }

    server {
        listen       8888 default_server;
        server_name  _;
        client_max_body_size 60m;

        location / {
            return 404;
        }
    }
}
