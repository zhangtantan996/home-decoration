user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    gzip  on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/x-javascript application/xml text/javascript application/json;

    upstream backend {
        server api:8080;
    }

    upstream tinode_http {
        server tinode:6060;
    }

    upstream tinode_ws {
        server tinode:6061;
    }

    server {
        listen       8888;
        server_name  _;

        # Align with backend upload size limits (50MB) + headroom.
        client_max_body_size 60m;

        # Admin Panel (Vite build) served at /
        root   /usr/share/nginx/html/admin;
        index  index.html;

        # Merchant center entry (built from merchant.html)
        # Dev server rewrites /merchant* -> /merchant.html; emulate that here.
        location = /merchant {
            try_files /merchant.html =404;
        }
        location /merchant/ {
            try_files $uri $uri/ /merchant.html;
        }

        # API Proxy (pass-through)
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Uploads served by backend static route: r.Static("/uploads", "./uploads")
        location /uploads/ {
            proxy_pass http://backend/uploads/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Tinode HTTP API
        location /tinode/v0/ {
            proxy_pass http://tinode_http/v0/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Tinode WebSocket
        location /tinode/ws {
            proxy_pass http://tinode_ws/v0/channels;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Tinode file upload/download
        location /tinode/file/ {
            proxy_pass http://tinode_http/v0/file/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

