# ============================================
# MCP 服务器配置文件（已清理版本）
# ============================================
# 说明：
# 1. 已删除 Replicate 和 Upstash Context7（不需要的服务）
# 2. 已修复所有语法错误
# 3. GitHub Token 需要你按照教程获取后替换
# ============================================

# Chrome DevTools - 用于调试和控制 Chrome 浏览器
[mcp_servers.chrome-devtools]
command = "npx"
args = [
  "-y",
  "chrome-devtools-mcp@latest"
]

# GitHub - 访问 GitHub 仓库和 API
# ⚠️ 请将 "YOUR_GITHUB_TOKEN_HERE" 替换为你从 GitHub 获取的实际 Token
[mcp_servers.github]
command = "npx"
args = [
    "-y",
    "mcp-remote@latest",
    "https://api.githubcopilot.com/mcp/",
    "--header",
    "Authorization: Bearer YOUR_GITHUB_TOKEN_HERE"
]

# Sequential Thinking - 提供结构化思考能力
[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

# Playwright - 浏览器自动化测试
[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

# Time Server - 提供时间相关功能（本地时区：上海）
[mcp_servers.mcp-server-time]
command = "uvx"
args = ["mcp-server-time", "--local-timezone=Asia/Shanghai"]

# Task Manager - 任务管理工具（中文模板）
[mcp_servers.mcp-shrimp-task-manager]
command = "npx"
args = ["-y", "mcp-shrimp-task-manager"]
env = { DATA_DIR = "/Users/lostsheep/tools/mcp-shrimp-task-manager/data", TEMPLATES_USE = "zh", ENABLE_GUI = "false" }

# DeepWiki - 维基百科深度搜索
[mcp_servers.mcp-deepwiki]
command = "npx"
args = ["-y", "mcp-deepwiki@latest"]

# Desktop Commander - 桌面命令控制
# ⚠️ 注意：此工具在 macOS 上功能可能受限（主要为 Windows 设计）
[mcp_servers.desktop-commander]
command = "npx"
args = ["-y", "@wonderwhy-er/desktop-commander"]
